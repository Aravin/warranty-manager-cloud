name: Play Store Internal Release

on:
  push:
    branches:
      - main
    paths:
      - 'mobile_app/**'
      - '.github/workflows/play_store_internal.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy to Play Store Internal Track
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload to Play Store Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: net.aravin.warranty_manager_cloud
          releaseFiles: mobile_app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
